<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schiphol — De toekomst van werk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    /* ── IFRAME ── */
    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 100;
      padding: 1.2rem 1.8rem;
    }

    /* Hamburger button */
    .menu-btn {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: rgba(6,8,15,0.55);
      border: 1px solid rgba(136,196,220,0.2);
      padding: 0.7rem 0.9rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .menu-btn span {
      display: block;
      width: 22px;
      height: 1px;
      background: #edeae4;
      transition: all 0.3s ease;
    }

    .menu-btn.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; }
    .menu-btn.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* Dropdown */
    .menu-dropdown {
      position: absolute;
      top: calc(100% + 0.4rem);
      right: 1.8rem;
      background: rgba(6,8,15,0.88);
      border: 1px solid rgba(136,196,220,0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      min-width: 200px;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .menu-dropdown.open {
      display: flex;
    }

    .menu-dropdown a {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #edeae4;
      text-decoration: none;
      padding: 0.85rem 1.4rem;
      border-bottom: 1px solid rgba(136,196,220,0.08);
      transition: background 0.2s, color 0.2s;
    }

    .menu-dropdown a:last-child { border-bottom: none; }

    .menu-dropdown a:hover {
      background: rgba(136,196,220,0.08);
      color: #88c4dc;
    }

    .menu-dropdown a.highlight {
      color: #c47d30;
      border-top: 1px solid rgba(196,125,48,0.2);
    }

    .menu-dropdown a.highlight:hover {
      background: rgba(196,125,48,0.08);
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap');
  </style>
</head>
<body>

  <iframe src="https://time-echo-story.lovable.app" allowfullscreen></iframe>

  <nav>
    <div class="menu-btn" id="menuBtn">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="menu-dropdown" id="menuDropdown">
      <a href="#">Vraagstukken</a>
      <a href="#">Oefening</a>
      <a href="#">Scan</a>
      <a href="#">Skills</a>
      <a href="#">Framework</a>
      <a href="#">Samen</a>
      <a href="#" class="highlight">2030</a>
    </div>
  </nav>

  <script>
    const btn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('menuDropdown');

    btn.addEventListener('click', () => {
      btn.classList.toggle('open');
      dropdown.classList.toggle('open');
    });

    // Sluit menu bij klik buiten
    document.addEventListener('click', (e) => {
      if (!btn.contains(e.target) && !dropdown.contains(e.target)) {
        btn.classList.remove('open');
        dropdown.classList.remove('open');
      }
    });
  </script>

</body>
</html>
