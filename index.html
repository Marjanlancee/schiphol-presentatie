<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schiphol — De toekomst van werk</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    iframe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 0;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.8rem;
      background: rgba(6,8,15,0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .logos {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .logo-lcs {
      height: 36px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.9;
    }

    .logo-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.15);
    }

    .logo-bright {
      height: 24px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.45;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .nav-links a {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(237,234,228,0.7);
      text-decoration: none;
      padding: 0.45rem 0.85rem;
      border-radius: 2px;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      background: rgba(136,196,220,0.1);
      color: #88c4dc;
    }

    .nav-links a.highlight {
      color: #c47d30;
      border: 1px solid rgba(196,125,48,0.35);
    }

    .nav-links a.highlight:hover {
      background: rgba(196,125,48,0.1);
      color: #d4904a;
    }

    /* ── OVERLAY TEKST ── */
    .overlay-text {
      position: fixed;
      bottom: 3.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      text-align: center;
      pointer-events: none;
    }

    .overlay-text .label {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(136,196,220,0.6);
      font-weight: 300;
    }
  </style>
</head>
<body>

  <iframe src="https://time-echo-story.lovable.app" allowfullscreen></iframe>

  <div class="topbar">
    <div class="logos">
      <img src="logo-lcs.png" alt="Luchtvaart Community Schiphol" class="logo-lcs">
      <div class="logo-divider"></div>
      <img src="logo-bright.png" alt="Bright Work Solutions" class="logo-bright">
    </div>
    <nav class="nav-links">
      <a href="#">Vraagstukken</a>
      <a href="#">Oefening</a>
      <a href="#">Scan</a>
      <a href="#">Skills</a>
      <a href="#">Framework</a>
      <a href="#">Samen</a>
      <a href="#" class="highlight">2030</a>
    </nav>
  </div>

  <div class="overlay-text">
    <span class="label">(ontwikkelingen)</span>
  </div>

</body>
</html>
